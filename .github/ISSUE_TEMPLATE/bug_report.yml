name: Bug Report
description: Report a bug in HelloJohn OSS
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please search existing issues to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: HelloJohn version
      description: Output of `hjctl version` or the release tag you installed
      placeholder: "v0.2.0"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - npx hellojohn-oss
        - Built from source
        - Docker
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (amd64)
        - Linux (arm64)
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `hjctl local start`
        2. Call `POST /v2/...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Paste relevant `.env` variables (redact secrets)
      render: shell
