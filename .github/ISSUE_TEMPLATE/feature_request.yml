name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests for Cloud-only features (billing, tunnel relay, cloud control plane) won't be accepted here — those belong in the Cloud product.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see implemented?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about?

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: Please confirm this is appropriate for OSS
      options:
        - label: This is not billing, tunnel relay, or cloud control plane functionality
          required: true
        - label: I searched existing issues and this hasn't been requested before
          required: true
